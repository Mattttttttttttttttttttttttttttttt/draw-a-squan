<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Abid Geometry Explorer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            min-width: 300px;
            background: #111;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-right: 1px solid #333;
        }

        #canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            overflow: hidden;
            position: relative;
        }

        h2 {
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .row label {
            font-size: 12px;
            color: #bbb;
            flex: 1;
        }

        .row .val {
            font-size: 12px;
            color: #7cf;
            width: 42px;
            text-align: right;
        }

        input[type=range] {
            flex: 1;
            accent-color: #4af;
            height: 4px;
            cursor: pointer;
        }

        input[type=color] {
            width: 36px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .toggle-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 5px 10px;
            font-size: 11px;
            font-family: monospace;
            border: 1px solid #444;
            background: #222;
            color: #aaa;
            cursor: pointer;
            border-radius: 3px;
            transition: all .15s;
        }

        .toggle-btn.active {
            background: #1a3a5c;
            border-color: #4af;
            color: #7cf;
        }

        #svg-output {
            max-width: 100%;
            max-height: 100%;
        }

        .piece-tabs {
            display: flex;
            gap: 6px;
        }

        .piece-tab {
            padding: 4px 12px;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid #444;
            background: #222;
            color: #aaa;
            cursor: pointer;
            border-radius: 3px;
        }

        .piece-tab.active {
            background: #1a3a5c;
            border-color: #4af;
            color: #7cf;
        }

        #error-box {
            display: none;
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: #3a0000;
            border: 1px solid #a00;
            color: #faa;
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 4px;
            max-width: 80%;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Abid Geo Explorer</h2>

        <div class="section">
            <div class="section-title">Piece</div>
            <div class="piece-tabs">
                <button class="piece-tab active" data-piece="edge">Edge</button>
                <button class="piece-tab" data-piece="corner">Corner</button>
                <button class="piece-tab" data-piece="both">Both</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Size</div>
            <div class="row">
                <label>size</label>
                <input type="range" id="sl-size" min="100" max="700" value="400" step="10" />
                <span class="val" id="v-size">400</span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Shared</div>
            <div class="row">
                <label>layerRatio <small style="color:#666">(midR & sf)</small></label>
                <input type="range" id="sl-layerratio" min="0.1" max="1.0" value="0.80" step="0.01" />
                <span class="val" id="v-layerratio">0.80</span>
            </div>
        </div>

        <div style="display:flex;gap:10px;">
            <div class="section" id="edge-controls" style="flex:1;">
                <div class="section-title">Edge</div>
                <div class="row">
                    <label>rOuter <small style="color:#666">(×size)</small></label>
                    <input type="range" id="sl-e-router" min="0.1" max="0.8" value="0.28" step="0.005" />
                    <span class="val" id="v-e-router">0.28</span>
                </div>
                <div class="row">
                    <label>half °</label>
                    <input type="range" id="sl-e-half" min="5" max="45" value="15" step="1" />
                    <span class="val" id="v-e-half">15</span>
                </div>
            </div>

            <div class="section" id="corner-controls" style="flex:1;">
                <div class="section-title">Corner</div>
                <div class="row">
                    <label>rOuter <small style="color:#666">(×size)</small></label>
                    <input type="range" id="sl-c-router" min="0.1" max="0.8" value="0.28" step="0.005" />
                    <span class="val" id="v-c-router">0.28</span>
                </div>
                <div class="row">
                    <label>rApex ×</label>
                    <input type="range" id="sl-c-rapex" min="0.8" max="2.0" value="1.366" step="0.001" />
                    <span class="val" id="v-c-rapex">1.366</span>
                </div>
                <div class="row">
                    <label>half °</label>
                    <input type="range" id="sl-c-half" min="10" max="60" value="30" step="1" />
                    <span class="val" id="v-c-half">30</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Colors</div>
            <div class="row"><label>top / inner</label> <input type="color" id="col-top" value="#4d4d4d" /></div>
            <div class="row"><label>left side</label> <input type="color" id="col-left" value="#0066CC" /></div>
            <div class="row"><label>right side</label> <input type="color" id="col-right" value="#CC0000" /></div>
            <div class="row"><label>outer (edge)</label> <input type="color" id="col-outer" value="#FF8C00" /></div>
            <div class="row"><label>border</label> <input type="color" id="col-border" value="#333333" /></div>
            <div class="row"><label>background</label> <input type="color" id="col-bg" value="#1a1a1a" /></div>
        </div>

        <div class="section">
            <div class="section-title">Display</div>
            <div class="row">
                <label>outer stroke</label>
                <input type="range" id="sl-stroke-width-outer" min="0" max="0.02" value="0.004" step="0.0005" />
                <span class="val" id="v-stroke-width-outer">0.004</span>
            </div>
            <div class="row">
                <label>inner stroke</label>
                <input type="range" id="sl-stroke-width-inner" min="0" max="0.02" value="0.003" step="0.0005" />
                <span class="val" id="v-stroke-width-inner">0.003</span>
            </div>
            <div class="toggle-row">
                <button class="toggle-btn active" id="btn-axes">Axes</button>
                <button class="toggle-btn active" id="btn-dots">Key Points</button>
                <button class="toggle-btn" id="btn-labels">Labels</button>
                <button class="toggle-btn active" id="btn-stroke">Stroke Width ×size</button>
                <button class="toggle-btn active" id="btn-round-corners">Round Corners</button>
            </div>
        </div>

        <div style="display:flex;gap:10px;">
            <div class="section" style="flex:1;">
                <div class="section-title">Edge Rot</div>
                <div class="row">
                    <input type="range" id="sl-rot-e" min="-180" max="180" value="0" step="1" />
                    <span class="val" id="v-rot-e">0</span>
                </div>
            </div>
            <div class="section" style="flex:1;">
                <div class="section-title">Corner Rot</div>
                <div class="row">
                    <input type="range" id="sl-rot-c" min="-180" max="180" value="0" step="1" />
                    <span class="val" id="v-rot-c">0</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Gap (both mode)</div>
            <div class="row">
                <label>spacing</label>
                <input type="range" id="sl-gap" min="0" max="200" value="60" step="5" />
                <span class="val" id="v-gap">60</span>
            </div>
        </div>
    </div>

    <div id="canvas-area">
        <svg id="svg-output"></svg>
        <div id="error-box"></div>
    </div>

    <script type="module">
        // ── We import drawScrambleCore but ONLY use its geometry helpers —
        // we re-implement the Abid draw functions locally so we can override params live.
        // drawScrambleCore is imported just to confirm the module path is valid
        // and to reuse resolveColor / defaultPieceColors if needed.
        // The actual geometry is duplicated here for live tweaking.

        // Safely import — if the path is wrong we show an error but the tool still works
        // with its own geometry.
        let coreOk = false;
        try {
            const mod = await import('../scripts/drawScrambleCore.js');
            coreOk = !!mod;
        } catch (e) {
            showError('⚠ Could not load drawScrambleCore.js from ../scripts/ — geometry preview still works locally. (' + e.message + ')');
        }

        // ── State ──────────────────────────────────────────────────────────────
        const state = {
            piece: 'edge',
            size: 400,
            showAxes: true, showDots: true, showLabels: false, scaledStroke: true,
            roundCorners: true,
            strokeWidthOuter: 0.004,
            strokeWidthInner: 0.003,
            rotationEdge: 0, rotationCorner: 0,
            edge: { routerFactor: 0.28, half: 15 },
            corner: { routerFactor: 0.28, rApexMult: 1.366025404, half: 30 },
            layerRatio: 0.80,
            colors: { top: '#4d4d4d', left: '#0066CC', right: '#CC0000', outer: '#FF8C00', border: '#333333', bg: '#1a1a1a' },
        };

        // ── Geometry helpers ───────────────────────────────────────────────────
        function pt(r, deg) {
            const rad = deg * Math.PI / 180;
            return { x: +(r * Math.sin(rad)).toFixed(3), y: +(-r * Math.cos(rad)).toFixed(3) };
        }
        function lerp(a, b, t) {
            return { x: +((a.x + (b.x - a.x) * t).toFixed(3)), y: +((a.y + (b.y - a.y) * t).toFixed(3)) };
        }
        function ps(pts) { return pts.map(p => `${p.x},${p.y}`).join(' '); }
        function strokeWidth(kind) {
            const baseSize = state.scaledStroke ? state.size : 400;
            return (baseSize * state[kind]).toFixed(2);
        }
        function strokeAttrs() {
            return state.roundCorners ? 'stroke-linejoin="round" stroke-linecap="round"' : 'stroke-linejoin="miter"';
        }

        // ── Draw functions ─────────────────────────────────────────────────────
        function drawEdge(size, p, c) {
            const rOuter = size * p.routerFactor;
            const midR = rOuter * state.layerRatio;
            const half = p.half;
            const pi = { x: 0, y: 0 };
            const pA = pt(rOuter, -half), pB = pt(rOuter, half);
            const pmA = pt(midR, -half), pmB = pt(midR, half);
            const swOuter = strokeWidth('strokeWidthOuter');
            const swInner = strokeWidth('strokeWidthInner');

            let svg = '';
            // Outer sticker (side color)
            svg += `<polygon points="${ps([pmA, pA, pB, pmB])}" fill="${c.outer}" opacity="0.95"/>`;
            // Inner sticker (top/bottom color)
            svg += `<polygon points="${ps([pi, pmA, pmB])}" fill="${c.top}" opacity="0.95"/>`;
            // Inner divider between the two colored layers
            svg += `<line x1="${pmA.x}" y1="${pmA.y}" x2="${pmB.x}" y2="${pmB.y}" stroke="${c.border}" stroke-width="${swInner}" stroke-linecap="${state.roundCorners ? 'round' : 'butt'}"/>`;
            // Outer triangle outline
            svg += `<polygon points="${ps([pi, pA, pB])}" fill="none" stroke="${c.border}" stroke-width="${swOuter}" ${strokeAttrs()}/>`;

            if (state.showAxes) {
                // radial lines
                svg += axisLine(0, 0, pt(rOuter * 1.3, -half), '#555');
                svg += axisLine(0, 0, pt(rOuter * 1.3, half), '#555');
                svg += axisLine(0, 0, pt(rOuter * 1.3, 0), '#335');
            }
            if (state.showDots) {
                for (const [p2, lbl] of [[pA, 'pA'], [pB, 'pB'], [pmA, 'pmA'], [pmB, 'pmB'], [pi, 'pi']]) {
                    svg += dot(p2.x, p2.y, '#7cf', lbl);
                }
            }
            return svg;
        }

        function drawCorner(size, p, c) {
            const rOuter = size * p.routerFactor;
            const rApex = rOuter * p.rApexMult;
            const half = p.half;
            const sf = state.layerRatio;
            const pi = { x: 0, y: 0 };
            const pOR = pt(rOuter, -half), pAp = pt(rApex, 0), pOL = pt(rOuter, half);
            const psL = lerp(pi, pOL, sf), psR = lerp(pi, pOR, sf), psB = lerp(pi, pAp, sf);
            const swOuter = strokeWidth('strokeWidthOuter');
            const swInner = strokeWidth('strokeWidthInner');

            let svg = '';
            svg += `<polygon points="${ps([pi, pOL, pAp, psB, psL])}" fill="${c.left}"  opacity="0.95"/>`;
            svg += `<polygon points="${ps([pi, psR, psB, pAp, pOR])}" fill="${c.right}" opacity="0.95"/>`;
            svg += `<polygon points="${ps([pi, psL, psB, psR])}"     fill="${c.top}"   opacity="0.95"/>`;
            // Internal separators between the colored regions
            svg += `<polyline points="${ps([psL, psB, psR])}" fill="none" stroke="${c.border}" stroke-width="${swInner}" ${strokeAttrs()}/>`;
            svg += `<line x1="${pAp.x}" y1="${pAp.y}" x2="${psB.x}" y2="${psB.y}" stroke="${c.border}" stroke-width="${swInner}" stroke-linecap="${state.roundCorners ? 'round' : 'butt'}"/>`;
            // Outer kite outline
            svg += `<polygon points="${ps([pi, pOL, pAp, pOR])}"     fill="none"       stroke="${c.border}" stroke-width="${swOuter}" ${strokeAttrs()}/>`;

            if (state.showAxes) {
                svg += axisLine(0, 0, pt(rOuter * 1.4, -half), '#555');
                svg += axisLine(0, 0, pt(rOuter * 1.4, half), '#555');
                svg += axisLine(0, 0, pt(rApex * 1.1, 0), '#335');
            }
            if (state.showDots) {
                for (const [p2, lbl] of [[pOR, 'pOR'], [pOL, 'pOL'], [pAp, 'pAp'], [psR, 'psR'], [psL, 'psL'], [psB, 'psB'], [pi, 'pi']]) {
                    svg += dot(p2.x, p2.y, '#7cf', lbl);
                }
            }
            return svg;
        }

        // ── Annotation helpers ─────────────────────────────────────────────────
        function axisLine(x1, y1, p2, col = '#444') {
            return `<line x1="${x1}" y1="${y1}" x2="${p2.x}" y2="${p2.y}" stroke="${col}" stroke-width="0.5" stroke-dasharray="3,3"/>`;
        }
        function dot(x, y, col, label = '') {
            let s = `<circle cx="${x}" cy="${y}" r="3" fill="${col}" opacity="0.8"/>`;
            if (state.showLabels && label) {
                s += `<text x="${x + 5}" y="${y - 4}" font-size="9" fill="${col}" font-family="monospace">${label}</text>`;
            }
            return s;
        }

        // ── Render ─────────────────────────────────────────────────────────────
        function render() {
            const svg = document.getElementById('svg-output');
            const size = state.size;
            const c = state.colors;
            const ep = state.edge, cp = state.corner;
            const vp = size * 0.75; // viewPort half

            // Cross/origin marker
            let axesSvg = '';
            if (state.showAxes) {
                axesSvg = `
      <line x1="-${vp}" y1="0" x2="${vp}" y2="0" stroke="#333" stroke-width="0.8"/>
      <line x1="0" y1="-${vp}" x2="0" y2="${vp}" stroke="#333" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="3" fill="#555"/>
    `;
            }

            let content = '';

            if (state.piece === 'edge' || state.piece === 'both') {
                content += `<g transform="rotate(${state.rotationEdge})">${axesSvg}${drawEdge(size, ep, c)}</g>`;
            }
            if (state.piece === 'corner' || state.piece === 'both') {
                content += `<g transform="rotate(${state.rotationCorner})">${state.piece === 'corner' ? axesSvg : ''}${drawCorner(size, cp, c)}</g>`;
            }
            const W = vp * 1.5;
            svg.setAttribute('width', W);
            svg.setAttribute('height', vp * 1.5);
            svg.setAttribute('viewBox', `${-W / 2} ${-vp * 0.75} ${W} ${vp * 1.5}`);
            svg.style.background = c.bg;
            svg.innerHTML = content;
        }

        // ── Controls wiring ────────────────────────────────────────────────────
        function wire(id, stateKey, valId, parser = parseFloat) {
            const el = document.getElementById(id);
            const vEl = document.getElementById(valId);
            el.addEventListener('input', () => {
                const v = parser(el.value);
                // navigate nested keys like 'edge.half'
                const parts = stateKey.split('.');
                let obj = state;
                for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
                obj[parts[parts.length - 1]] = v;
                const leaf = parts[parts.length - 1];
                vEl.textContent = v.toFixed(leaf.startsWith('strokeWidth') ? 4 : leaf.includes('half') || leaf === 'gap' || leaf === 'size' || leaf === 'rotation' ? 0 : 3);
                render();
            });
        }

        wire('sl-size', 'size', 'v-size', parseInt);
        wire('sl-layerratio', 'layerRatio', 'v-layerratio');
        wire('sl-rot-e', 'rotationEdge', 'v-rot-e', parseInt);
        wire('sl-rot-c', 'rotationCorner', 'v-rot-c', parseInt);
        wire('sl-e-router', 'edge.routerFactor', 'v-e-router');
        wire('sl-e-half', 'edge.half', 'v-e-half', parseInt);
        wire('sl-c-router', 'corner.routerFactor', 'v-c-router');
        wire('sl-c-rapex', 'corner.rApexMult', 'v-c-rapex');
        wire('sl-c-half', 'corner.half', 'v-c-half', parseInt);
        wire('sl-stroke-width-outer', 'strokeWidthOuter', 'v-stroke-width-outer');
        wire('sl-stroke-width-inner', 'strokeWidthInner', 'v-stroke-width-inner');

        for (const [id, key] of [
            ['col-top', 'top'], ['col-left', 'left'], ['col-right', 'right'],
            ['col-outer', 'outer'], ['col-border', 'border'], ['col-bg', 'bg']
        ]) {
            document.getElementById(id).addEventListener('input', e => {
                state.colors[key] = e.target.value;
                render();
            });
        }

        for (const btn of document.querySelectorAll('.piece-tab')) {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.piece-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.piece = btn.dataset.piece;
                updateControlVisibility();
                render();
            });
        }

        function toggleBtn(id, stateKey) {
            document.getElementById(id).addEventListener('click', e => {
                state[stateKey] = !state[stateKey];
                e.target.classList.toggle('active', state[stateKey]);
                render();
            });
        }
        toggleBtn('btn-axes', 'showAxes');
        toggleBtn('btn-dots', 'showDots');
        toggleBtn('btn-labels', 'showLabels');
        toggleBtn('btn-stroke', 'scaledStroke');
        toggleBtn('btn-round-corners', 'roundCorners');

        function updateControlVisibility() {
            const showEdge = state.piece !== 'corner';
            const showCorner = state.piece !== 'edge';
            document.getElementById('edge-controls').style.opacity = showEdge ? '1' : '0.3';
            document.getElementById('corner-controls').style.opacity = showCorner ? '1' : '0.3';

        }

        function showError(msg) {
            const el = document.getElementById('error-box');
            el.textContent = msg; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 6000);
        }

        updateControlVisibility();
        render();
    </script>
</body>

</html>
